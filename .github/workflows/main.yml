A small architectural recommendation
For Clean Architecture + CQRS, I recommend not using a generic repository everywhere. Instead:

Use CQRS with MediatR for commands and queries.

Use Entity Framework Core directly within command/query handlers where appropriate, or through focused repository interfaces when they add value.

Keep business rules in the Application layer.

Keep the Domain layer free of framework dependencies.

Use FluentValidation as a MediatR pipeline behavior.

Use AutoMapper (or Mapster) for DTO mapping.

Add global exception handling, logging, and JWT authentication from the beginning.

This results in a modern, maintainable architecture that aligns with current .NET best practices.

