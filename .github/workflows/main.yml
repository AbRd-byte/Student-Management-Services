4. Service Layer
src/services/auth.service.ts
import api from "./axios";

import { API } from "../constants/api.constants";

import {
  RegistrationRequest,
  RegistrationResponse,
} from "../interfaces/auth.interface";

export const registerUser = async (
  data: RegistrationRequest
): Promise<RegistrationResponse> => {
  const response = await api.post<RegistrationResponse>(
    API.REGISTER,
    data
  );

  return response.data;
};
5. Thunk
src/redux/thunks/auth.thunk.ts
import { createAsyncThunk } from "@reduxjs/toolkit";

import { ACTIONS } from "../../constants/action.constants";

import { registerUser } from "../../services/auth.service";

import { RegistrationRequest } from "../../interfaces/auth.interface";

export const registerThunk = createAsyncThunk(
  ACTIONS.REGISTER,

  async (user: RegistrationRequest, thunkAPI) => {
    try {
      return await registerUser(user);
    } catch (error: any) {
      return thunkAPI.rejectWithValue(error.response?.data);
    }
  }
);
6. Slice
src/redux/slices/auth.slice.ts
import { createSlice } from "@reduxjs/toolkit";

import { AuthState } from "../../interfaces/auth.interface";

import { registerThunk } from "../thunks/auth.thunk";

const initialState: AuthState = {
  loading: false,

  user: null,

  error: null,
};

const authSlice = createSlice({
  name: "auth",

  initialState,

  reducers: {},

  extraReducers: (builder) => {
    builder

      .addCase(registerThunk.pending, (state) => {
        state.loading = true;
      })

      .addCase(registerThunk.fulfilled, (state, action) => {
        state.loading = false;

        state.user = action.payload;
      })

      .addCase(registerThunk.rejected, (state, action) => {
        state.loading = false;

        state.error = action.payload as string;
      });
  },
});

export default authSlice.reducer;
7. Store
import { configureStore } from "@reduxjs/toolkit";

import authReducer from "../redux/slices/auth.slice";

export const store = configureStore({
  reducer: {
    auth: authReducer,
  },
});

export type RootState = ReturnType<typeof store.getState>;

export type AppDispatch = typeof store.dispatch;
8. Registration Component
import { useState } from "react";

import { registerThunk } from "../../redux/thunks/auth.thunk";

import { useAppDispatch } from "../../hooks/useAppDispatch";

import { RegistrationRequest } from "../../interfaces/auth.interface";

const Registration = () => {
  const dispatch = useAppDispatch();

  const [formData, setFormData] =
    useState<RegistrationRequest>({
      firstName: "",
      lastName: "",
      email: "",
      phone: "",
      department: "",
      password: "",
      confirmPassword: "",
    });

  const handleSubmit = (e: React.FormEvent) => {
    e.preventDefault();

    dispatch(registerThunk(formData));
  };

  return (
    <form onSubmit={handleSubmit}>
      {/* Your form fields */}
    </form>
  );
};

export default Registration;
Benefits of this structure
вњ… All interfaces are in one place.

вњ… All API endpoints and application constants are centralized.

вњ… Services only handle API calls.

вњ… Thunks handle asynchronous operations.

вњ… Slices manage Redux state.

вњ… Components focus on rendering and user interactions.

вњ… Strong typing throughout the application.

This is a structure commonly used in medium to large React + TypeScript applications and will make it easier to add features such as login, employee management, role-based access, and JWT authentication later.


